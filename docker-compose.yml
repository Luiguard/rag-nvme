version: '3.8'

services:
  rag-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: rag-nvme:latest
    container_name: rag-server
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - rag_data:/app/data
      - rag_index:/app/index
      - rag_models:/app/models
    environment:
      - RAG_BIND_HOST=0.0.0.0
      - RAG_MAX_WORKERS=8
      - RAG_MAX_CONCURRENT=200
      - RAG_LAZY_EMBEDDING=True
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  rag_data:
  rag_index:
  rag_models:
  prometheus_data:
  grafana_data:
